name: Deploy Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build metadata
        run: |
          COMMIT_SHA="$(git rev-parse --short=12 HEAD)"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "VITE_APP_VERSION=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "VITE_APP_COMMIT=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "VITE_APP_BUILD_TIME=${BUILD_TIME}" >> "$GITHUB_ENV"
          echo "APP_VERSION=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "APP_COMMIT_SHA=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "APP_BUILD_TIME=${BUILD_TIME}" >> "$GITHUB_ENV"

      - name: Build for production
        run: npm run build

      - name: Verify build artifact integrity
        run: npm run verify:artifact

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
