name: Invoice OCR Perf Baseline

on:
  pull_request:
    paths:
      - 'src/pages/Tools/components/invoice-ocr/**'
      - 'src/services/invoiceOCRService.ts'
      - 'src/services/n8nWebhookService.ts'
      - 'scripts/perf-invoice-ocr-baseline.mjs'
      - '.github/workflows/invoice-ocr-perf-baseline.yml'
  push:
    branches:
      - master
    paths:
      - 'src/pages/Tools/components/invoice-ocr/**'
      - 'src/services/invoiceOCRService.ts'
      - 'src/services/n8nWebhookService.ts'
      - 'scripts/perf-invoice-ocr-baseline.mjs'
      - '.github/workflows/invoice-ocr-perf-baseline.yml'

jobs:
  perf-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run invoice OCR perf baseline
        run: npm run perf:invoice-ocr-baseline

      - name: Upload perf artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-ocr-perf-baseline
          path: artifacts/invoice-ocr-perf-baseline.json
          if-no-files-found: error
