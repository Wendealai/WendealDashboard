name: Release Rollback

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to restore (commit/tag/branch)
        required: true
        default: HEAD~1

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate migration safety
        run: node scripts/migration-safety-check.mjs

      - name: Restore repository files from target ref
        run: |
          git checkout "${{ github.event.inputs.target_ref }}" -- .
          git add -A
          if git diff --cached --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
          fi

      - name: Create rollback pull request
        if: env.NO_CHANGES != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: rollback/${{ github.run_id }}
          commit-message: chore(rollback): restore state from ${{ github.event.inputs.target_ref }}
          title: "chore(rollback): restore state from ${{ github.event.inputs.target_ref }}"
          body: |
            Automated rollback PR generated by workflow.

            - Target ref: `${{ github.event.inputs.target_ref }}`
            - Triggered by: `${{ github.actor }}`
            - Workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          labels: rollback,automated
