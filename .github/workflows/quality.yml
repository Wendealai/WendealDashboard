name: Quality Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  release_blocking:
    name: Release Blocking Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (build path)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Sparkery ownership note
        run: echo "Sparkery UI quality gates now run in Wendealai/Sparkery."

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run contract tests
        run: npm run test:contract

  debug_experimental:
    name: Debug Experimental Gates
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests (non-blocking)
        run: npm run test:integration -- --passWithNoTests

      - name: Run e2e tests (non-blocking)
        run: npm run test:e2e -- --passWithNoTests
